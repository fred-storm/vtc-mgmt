---
- name: Enforce Compliance Settings on Codecs
  hosts: all
  gather_facts: no
  connection: local
  module_defaults: 
    uri:
      url: "https://{{inventory_hostname}}/getxml?location=/Configuration/"
      method: GET
      user: "{{ codec_user }}"
      password: "{{ codec_password }}"
      force_basic_auth: yes
      validate_certs: no
      body_format: raw
      headers: 
        Content-Type: "text-xml"
      return_content: yes
  vars_files:
    - ~/ansible/vtc-mgmt/vault/vtc_vault.yml
  
  vars:
    codec_user: "{{ user }}"
    codec_password: "{{ passwd }}"
    dest_file: ~/ansible/vtc-mgmt/outputs/compliance-output.csv
    syslog_server: syslog.some.place
    syslog_port: 5014

  tasks:

    - name: Create CSV with Headers
      copy:
        content: "Codec, Address, Wifi, Bluetooth, Serial, Banner"
        dest: "{{ dest_file }}"
        force: no
      delegate_to: localhost
      run_once: yes

    - name: Get Current Codec Configuration
      uri:
      register: codec_config
      delegate_to: localhost

    - name: Parse Codec Configuration
      set_fact:
        codec_config_parsed: "{{ codec_config.content | ansible.utils.from_xml }}"

    - name: Display Current Wifi Setting
      debug:
        var: codec_config.Configuration.NetworkServices.Wifi.Allowed

  